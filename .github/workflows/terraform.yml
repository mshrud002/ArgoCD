name: Terraform

on:
  pull_request:
    branches: [main]
    paths:
      - '*.tf'
      - '*.tfvars.example'
      - 'values.yaml'
      - '.github/workflows/terraform.yml'
  push:
    branches: [main]
    paths:
      - '*.tf'
      - '*.tfvars.example'
      - 'values.yaml'
      - '.github/workflows/terraform.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate
